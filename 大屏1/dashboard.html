<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品数据可视化大屏</title>
    <script src="./vendor/echarts.min.js"></script>
    <script src="./vendor/plotly-2.27.0.min.js"></script>
    <script src="daily_data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; 
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }
        
        :root {
            --meituan-yellow: #FEC200;
            --meituan-yellow-light: #F5D047;
            --meituan-yellow-lighter: #FFEB87;
            --meituan-green: #23D395;
            --meituan-orange: #FD9972;
            --meituan-orange-dark: #FFA15A;
            --meituan-blue: #4896F4;
            --meituan-pink: #EE80A2;
            --meituan-lime: #B6E880;
            --meituan-dark: #1a1a2e;
            --meituan-card-bg: #ffffff;
            --meituan-text: #333333;
            --meituan-text-secondary: #666666;
        }
        
        .dashboard {
            width: 1920px;
            height: 1080px;
            margin: 0 auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
        }
        
        @media (max-width: 1920px) {
            .dashboard {
                transform-origin: top left;
                transform: scale(calc(100vw / 1920));
            }
        }
        
        /* Tab栏 */
        .tab-bar {
            display: flex;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
            border: 1px solid rgba(254, 194, 0, 0.3);
        }
        
        .tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-right: 1px solid rgba(254, 194, 0, 0.2);
            color: #fff;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .tab:last-child { border-right: none; }
        .tab:hover { background-color: rgba(254, 194, 0, 0.2); color: var(--meituan-yellow); }
        .tab.active { background-color: var(--meituan-yellow); color: var(--meituan-dark); }
        
        /* 标题 */
        .header {
            height: 80px;
            width: 1850px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(254, 194, 0, 0.1) 20%, rgba(254, 194, 0, 0.2) 50%, rgba(254, 194, 0, 0.1) 80%, transparent 100%);
            border-radius: 8px;
        }
        
        .header h1 { 
            font-size: 28px; 
            color: var(--meituan-yellow);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(254, 194, 0, 0.5);
            letter-spacing: 4px;
        }
        
        /* 筛选栏 */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 45px;
            margin-bottom: 15px;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(254, 194, 0, 0.2);
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-group label { font-size: 14px; color: var(--meituan-yellow-light); font-weight: 500; }
        
        .filter-group select,
        .filter-group input {
            width: 280px;
            height: 32px;
            padding: 6px 12px;
            border: 1px solid rgba(254, 194, 0, 0.3);
            border-radius: 6px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .filter-group select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        /* 多选下拉框样式 */
        .multi-select-container {
            position: relative;
            width: 280px;
            z-index: 10000;
        }
        
        .multi-select-header {
            height: 32px;
            padding: 6px 12px;
            border: 1px solid rgba(254, 194, 0, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .multi-select-header:hover {
            border-color: rgba(254, 194, 0, 0.5);
        }
        
        .dropdown-arrow {
            font-size: 10px;
            color: var(--meituan-yellow);
        }
        
        .multi-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: #1a1a2e;
            border: 1px solid rgba(254, 194, 0, 0.3);
            border-radius: 6px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 99999;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .multi-select-dropdown.show {
            display: block;
        }
        
        /* 活动类型滚动下拉框样式 */
        .activity-select-container {
            position: relative;
            width: 150px;
            z-index: 99999;
        }
        
        .activity-select-header {
            width: 100%;
            height: 32px;
            padding: 6px 12px;
            border: 1px solid rgba(254, 194, 0, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        
        .activity-select-header:hover {
            border-color: rgba(254, 194, 0, 0.5);
        }
        
        .activity-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: #1a1a2e;
            border: 1px solid rgba(254, 194, 0, 0.3);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 99999;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .activity-select-dropdown.show {
            display: block;
        }
        
        .activity-option {
            padding: 8px 12px;
            cursor: pointer;
            color: #fff;
            font-size: 13px;
        }
        
        .activity-option:hover,
        .activity-option.selected {
            background: rgba(254, 194, 0, 0.3);
        }
        
        .multi-select-option {
            padding: 8px 12px;
            cursor: pointer;
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .multi-select-option:hover {
            background: rgba(254, 194, 0, 0.2);
        }
        
        .multi-select-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .multi-select-option label {
            cursor: pointer;
            flex: 1;
            color: #fff;
        }
        
        .btn {
            padding: 8px 24px;
            background: linear-gradient(135deg, var(--meituan-yellow) 0%, var(--meituan-orange-dark) 100%);
            color: var(--meituan-dark);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(254, 194, 0, 0.4);
        }
        
        /* 指标卡片 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .metric-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            height: 75px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(254, 194, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(254, 194, 0, 0.2);
            border-color: rgba(254, 194, 0, 0.5);
        }
        
        .metric-card:nth-child(1) { border-top: 3px solid var(--meituan-yellow); }
        .metric-card:nth-child(2) { border-top: 3px solid var(--meituan-green); }
        .metric-card:nth-child(3) { border-top: 3px solid var(--meituan-blue); }
        .metric-card:nth-child(4) { border-top: 3px solid var(--meituan-orange); }
        .metric-card:nth-child(5) { border-top: 3px solid var(--meituan-pink); }
        .metric-card:nth-child(6) { border-top: 3px solid var(--meituan-lime); }
        .metric-card:nth-child(7) { border-top: 3px solid var(--meituan-yellow-light); }
        .metric-card:nth-child(8) { border-top: 3px solid var(--meituan-orange-dark); }
        
        .metric-card.single-metric {
            text-align: center;
        }
        
        .metric-card.single-metric .metric-title { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
        .metric-card.single-metric .metric-value { font-size: 18px; font-weight: bold; color: var(--meituan-yellow); }
        
        .metric-card.double-metric {
            text-align: center;
        }
        
        .metric-card.double-metric .metric-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .metric-card.double-metric .metric-row:last-child {
            margin-bottom: 0;
        }
        
        .metric-card.double-metric .metric-title {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }
        
        .metric-card.double-metric .metric-value {
            font-size: 15px;
            font-weight: bold;
            color: var(--meituan-yellow);
        }
        
        /* 图表网格 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 250px 240px 240px;
            gap: 15px;
            flex: 1;
        }
        
        .chart-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(254, 194, 0, 0.15);
            transition: all 0.3s ease;
        }
        
        .chart-container:hover {
            border-color: rgba(254, 194, 0, 0.4);
            box-shadow: 0 6px 25px rgba(254, 194, 0, 0.15);
        }
        
        .chart-title {
            font-size: 15px;
            color: var(--meituan-yellow);
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .chart { 
            width: 100%; 
            height: calc(100% - 30px); 
            position: relative;
        }
        
        /* 确保图表canvas不会覆盖下拉框 */
        .chart canvas {
            z-index: 1 !important;
        }
        
        /* 筛选栏设置为最高层级 */
        .filter-bar {
            z-index: 9999;
            position: relative;
        }
        
        /* 网格布局 */
        .chart-1 { grid-column: 1 / 3; grid-row: 1 / 2; }
        .chart-2 { grid-column: 3 / 5; grid-row: 1 / 2; }
        .chart-5 { grid-column: 1 / 3; grid-row: 2 / 4; }
        .chart-6 { grid-column: 3 / 4; grid-row: 2 / 3; }
        .chart-7 { grid-column: 4 / 5; grid-row: 2 / 3; }
        .chart-8 { grid-column: 3 / 4; grid-row: 3 / 4; }
        .chart-9 { grid-column: 4 / 5; grid-row: 3 / 4; }
        
        /* 图表放大弹窗样式 */
        .chart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        
        .chart-modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 90%;
            height: 90%;
            max-width: 1400px;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .chart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .chart-modal-header h3 {
            margin: 0;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }
        
        .chart-modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .chart-modal-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .chart-modal-body {
            flex: 1;
            padding: 20px;
            min-height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- 图表放大弹窗 -->
    <div id="chartModal" class="chart-modal">
        <div class="chart-modal-content">
            <div class="chart-modal-header">
                <h3 id="modalTitle">图表详情</h3>
                <button class="chart-modal-close" onclick="closeChartModal()">&times;</button>
            </div>
            <div id="modalChart" class="chart-modal-body"></div>
        </div>
    </div>
    
    <div class="dashboard">
        <div class="tab-bar">
            <div class="tab">A</div>
            <div class="tab">B</div>
            <div class="tab">C</div>
            <div class="tab">D</div>
        </div>
        
        <div class="header">
            <h1>商品数据可视化大屏</h1>
        </div>
        
        <div class="filter-bar">
            <div class="filter-group">
                <label>商品品类选择</label>
                <select id="category-type">
                    <option value="一级分类" selected>一级分类</option>
                    <option value="二级分类">二级分类</option>
                    <option value="三级分类">三级分类</option>
                    <option value="品牌名称">品牌名称</option>
                </select>
            </div>
            <div class="filter-group">
                <label>商品细分</label>
                <div class="multi-select-container" id="subcategory-container">
                    <div class="multi-select-header" id="subcategory-header">
                        <span id="subcategory-display">全部</span>
                        <span class="dropdown-arrow">▼</span>
                    </div>
                    <div class="multi-select-dropdown" id="subcategory-dropdown">
                        <div class="multi-select-option selected" data-value="all">
                            <input type="checkbox" checked id="check-all"> <label for="check-all">全部</label>
                        </div>
                        <div id="subcategory-options"></div>
                    </div>
                </div>
            </div>
            <div class="filter-group">
                <label>时间范围</label>
                <input type="date" id="start-date" value="2025-09-01" min="2025-09-01" max="2025-11-30">
                <span style="color: #fff;">至</span>
                <input type="date" id="end-date" value="2025-11-30" min="2025-09-01" max="2025-11-30">
                <button class="btn" onclick="applyFilters()">确定</button>
            </div>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card double-metric">
                <div class="metric-row">
                    <span class="metric-title">订单量</span>
                    <span class="metric-value">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-title">订单量同比增长</span>
                    <span class="metric-value">-</span>
                </div>
            </div>
            <div class="metric-card double-metric">
                <div class="metric-row">
                    <span class="metric-title">销售量</span>
                    <span class="metric-value">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-title">销售量同比增长</span>
                    <span class="metric-value">-</span>
                </div>
            </div>
            <div class="metric-card double-metric">
                <div class="metric-row">
                    <span class="metric-title">销售额</span>
                    <span class="metric-value">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-title">销售额同比增长</span>
                    <span class="metric-value">-</span>
                </div>
            </div>
            <div class="metric-card single-metric">
                <div class="metric-title">连带率</div>
                <div class="metric-value">-</div>
            </div>
            <div class="metric-card single-metric">
                <div class="metric-title">浏览购买转化率</div>
                <div class="metric-value">-</div>
            </div>
            <div class="metric-card double-metric">
                <div class="metric-row">
                    <span class="metric-title">平均价格</span>
                    <span class="metric-value">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-title">平均折扣率</span>
                    <span class="metric-value">-</span>
                </div>
            </div>
            <div class="metric-card single-metric">
                <div class="metric-title">贡献度</div>
                <div class="metric-value">-</div>
            </div>
            <div class="metric-card single-metric">
                <div class="metric-title">平均单品产出</div>
                <div class="metric-value">-</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container chart-1">
                <div class="chart-title">销售额、销售量、订单量趋势图</div>
                <div id="trendChart" class="chart"></div>
            </div>
            <div class="chart-container chart-2">
                <div class="chart-title">销售额/销售量/订单量占比</div>
                <div id="combinedPieChart" class="chart"></div>
            </div>
            <div class="chart-container chart-5">
                <div class="chart-title">关联规则3D图</div>
                <div class="filter-bar" style="padding: 8px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: transparent; margin: 0;">
                    <div class="filter-group" style="gap: 8px;">
                        <label style="font-size: 13px;">选择活动类型</label>
                        <div class="activity-select-container">
                            <div class="activity-select-header" id="activity-type-header">
                                <span id="activity-type-display">8月活动</span>
                                <span class="dropdown-arrow">▼</span>
                            </div>
                            <div class="activity-select-dropdown" id="activity-type-dropdown">
                                <div class="activity-option selected" data-value="8月活动">8月活动</div>
                                <div class="activity-option" data-value="9月活动">9月活动</div>
                                <div class="activity-option" data-value="10月活动">10月活动</div>
                                <div class="activity-option" data-value="11月活动">11月活动</div>
                                <div class="activity-option" data-value="8月">8月</div>
                                <div class="activity-option" data-value="9月">9月</div>
                                <div class="activity-option" data-value="10月">10月</div>
                                <div class="activity-option" data-value="11月">11月</div>
                                <div class="activity-option" data-value="9月无活动">9月无活动</div>
                                <div class="activity-option" data-value="10月无活动">10月无活动</div>
                                <div class="activity-option" data-value="11月无活动">11月无活动</div>
                            </div>
                        </div>
                        <button id="activity-type-btn" style="width: 60px; height: 32px; font-size: 13px; background-color: #FEC200; color: #000; border: none; border-radius: 4px; cursor: pointer;">确定</button>
                    </div>
                </div>
                <div id="relationChart" class="chart" style="height: 390px;"></div>
            </div>
            <div class="chart-container chart-6">
                <div class="chart-title">商品转化率象限图</div>
                <div id="quadrantChart" class="chart"></div>
            </div>
            <div class="chart-container chart-7">
                <div class="chart-title">商品折扣分布箱线图</div>
                <div id="boxChart" class="chart"></div>
            </div>
            <div class="chart-container chart-8">
                <div class="chart-title">商品综合表现雷达图</div>
                <div id="radarChart" class="chart"></div>
            </div>
            <div class="chart-container chart-9">
                <div class="chart-title">品类-子品类分布热力图</div>
                <div id="heatmapChart" class="chart"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 美团配色方案
        const meituanColors = ['#FEC200', '#23D395', '#4896F4', '#FD9972', '#EE80A2', '#B6E880', '#F5D047', '#FFA15A'];
        
        // 分类数据

        // 初始化筛选栏

        // 格式化数字
        function formatNumber(num) {
            if (num === null || num === undefined) return 'none';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return num.toLocaleString();
            return num.toFixed(2);
        }
        
        // 格式化百分比
        function formatPercent(num) {
            if (num === null || num === undefined) return 'none';
            const sign = num >= 0 ? '+' : '';
            return sign + num.toFixed(1) + '%';
        }
        
        // 格式化货币
        function formatCurrency(num) {
            if (num === null || num === undefined) return 'none';
            if (num >= 1000000) return '¥' + (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return '¥' + num.toLocaleString();
            return '¥' + num.toFixed(2);
        }

        // 计算日期差（天数）
        function getDaysDiff(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            return Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
        }
        
        // 获取同比时间段
        function getPrevPeriod(startDate, endDate) {
            const days = getDaysDiff(startDate, endDate);
            const start = new Date(startDate);
            const end = new Date(endDate);
            const prevEnd = new Date(start);
            prevEnd.setDate(prevEnd.getDate() - 1);
            const prevStart = new Date(prevEnd);
            prevStart.setDate(prevStart.getDate() - days + 1);
            return {
                start: prevStart.toISOString().split('T')[0],
                end: prevEnd.toISOString().split('T')[0]
            };
        }
        
        // 计算时间段内的指标
        function calculateMetrics(startDate, endDate, categoryType, subcategories) {
            const data = window.dailyData || [];
            
            // 筛选日期范围内的数据
            let filtered = data.filter(d => d.d >= startDate && d.d <= endDate);
            
            // 计算该日期范围内的总销售额（用于贡献度计算）
            let totalSalesAll = 0;
            filtered.forEach(d => {
                totalSalesAll += d.sa;
            });
            
            // 如果选择了具体品类（非"全部"），则按品类筛选
            if (subcategories && !subcategories.includes('all')) {
                // 根据categoryType筛选对应字段
                filtered = filtered.filter(d => {
                    if (categoryType === '一级分类') {
                        return subcategories.includes(d.c1);
                    } else if (categoryType === '二级分类') {
                        return subcategories.includes(d.c2);
                    } else if (categoryType === '三级分类') {
                        return subcategories.includes(d.c3);
                    } else if (categoryType === '品牌名称') {
                        return subcategories.includes(d.b);
                    }
                    return true;
                });
            }
            
            if (filtered.length === 0) {
                return null;
            }
            
            // 聚合指标
            const metrics = {
                订单量: 0,
                销售量: 0,
                销售额: 0,
                连带率: 0,
                浏览购买转化率: 0,
                平均价格: 0,
                平均折扣率: 0,
                贡献度: 0,
                平均单品产出: 0
            };
            
            let totalOrders = 0;
            let totalBuyUv = 0;
            let totalViewUv = 0;
            let totalSalesQty = 0;
            let totalSalesAmount = 0;
            let totalDiscountRate = 0;
            
            filtered.forEach(d => {
                totalOrders += d.o;
                totalBuyUv += d.bu;
                totalViewUv += d.vu;
                totalSalesQty += d.sq;
                totalSalesAmount += d.sa;
                totalDiscountRate += d.dr;
            });
            
            metrics['订单量'] = totalOrders;
            metrics['销售量'] = totalSalesQty;
            metrics['销售额'] = totalSalesAmount;
            // 连带率 = 总销量 / 总订单数
            metrics['连带率'] = totalOrders > 0 ? (totalSalesQty / totalOrders) : 0;
            // 浏览购买转化率 = buy_uv / view_uv
            metrics['浏览购买转化率'] = totalViewUv > 0 ? (totalBuyUv / totalViewUv * 100) : 0;
            metrics['平均价格'] = totalSalesQty > 0 ? (totalSalesAmount / totalSalesQty) : 0;
            metrics['平均折扣率'] = filtered.length > 0 ? (totalDiscountRate / filtered.length * 100) : 0;
            // 贡献度 = 该品类销售额 / 总销售额
            metrics['贡献度'] = totalSalesAll > 0 ? (totalSalesAmount / totalSalesAll * 100) : 0;
            // 平均单品产出 = 总销售额 / 该品类销售量
            metrics['平均单品产出'] = totalSalesQty > 0 ? (totalSalesAmount / totalSalesQty) : 0;
            
            return metrics;
        }
        
        // 计算同比增长率
        function calculateYoY(current, prev) {
            const yoy = {};
            
            // 订单量同比
            if (prev && prev['订单量'] > 0) {
                yoy['订单量同比增长'] = ((current['订单量'] - prev['订单量']) / prev['订单量']) * 100;
            } else {
                yoy['订单量同比增长'] = null;
            }
            
            // 销售量同比
            if (prev && prev['销售量'] > 0) {
                yoy['销售量同比增长'] = ((current['销售量'] - prev['销售量']) / prev['销售量']) * 100;
            } else {
                yoy['销售量同比增长'] = null;
            }
            
            // 销售额同比
            if (prev && prev['销售额'] > 0) {
                yoy['销售额同比增长'] = ((current['销售额'] - prev['销售额']) / prev['销售额']) * 100;
            } else {
                yoy['销售额同比增长'] = null;
            }
            
            // 平均价格同比变化
            if (prev && prev['平均价格'] > 0) {
                yoy['平均价格同比变化'] = ((current['平均价格'] - prev['平均价格']) / prev['平均价格']) * 100;
            } else {
                yoy['平均价格同比变化'] = null;
            }
            
            return yoy;
        }

        // 计算趋势图数据
        function calculateTrendData(startDate, endDate, categoryType, subcategories) {
            const data = window.dailyData || [];
            
            // 筛选日期范围内的数据
            let filtered = data.filter(d => d.d >= startDate && d.d <= endDate);
            
            // 如果选择了具体品类（非"全部"），则按品类筛选
            if (subcategories && !subcategories.includes('all')) {
                filtered = filtered.filter(d => {
                    if (categoryType === '一级分类') {
                        return subcategories.includes(d.c1);
                    } else if (categoryType === '二级分类') {
                        return subcategories.includes(d.c2);
                    } else if (categoryType === '三级分类') {
                        return subcategories.includes(d.c3);
                    } else if (categoryType === '品牌名称') {
                        return subcategories.includes(d.b);
                    }
                    return true;
                });
            }
            
            // 按日期聚合
            const dailyMap = new Map();
            filtered.forEach(d => {
                if (!dailyMap.has(d.d)) {
                    dailyMap.set(d.d, { salesAmount: 0, salesQty: 0, orders: 0 });
                }
                const item = dailyMap.get(d.d);
                item.salesAmount += d.sa;
                item.salesQty += d.sq;
                item.orders += d.o;
            });
            
            // 排序日期
            const sortedDates = Array.from(dailyMap.keys()).sort();
            
            return {
                dates: sortedDates,
                salesAmount: sortedDates.map(d => dailyMap.get(d).salesAmount),
                salesQty: sortedDates.map(d => dailyMap.get(d).salesQty),
                orders: sortedDates.map(d => dailyMap.get(d).orders)
            };
        }

            }
            
            // 格式化日期显示
            const formattedDates = trendData.dates.map(d => {
                const date = new Date(d);
                return (date.getMonth() + 1) + '/' + date.getDate();
            });
            
            trendChart.setOption({
                xAxis: {
                    data: formattedDates
                },
                series: [

        }
        
        // 计算环形图数据（按细分项分组）
        function calculatePieData(startDate, endDate, categoryType, subcategories) {
            const data = window.dailyData || [];
            
            // 筛选日期范围内的数据
            let filtered = data.filter(d => d.d >= startDate && d.d <= endDate);
            
            // 确定要显示的细分项

                const allItems = new Set();
                filtered.forEach(d => {

                    else if (categoryType === '二级分类') allItems.add(d.c2);
                    else if (categoryType === '三级分类') allItems.add(d.c3);
                    else if (categoryType === '品牌名称') allItems.add(d.b);
                });
                itemsToShow = Array.from(allItems);
            }
            
            // 按细分项聚合
            const itemMap = new Map();
            itemsToShow.forEach(item => {
                itemMap.set(item, { salesAmount: 0, salesQty: 0, orders: 0 });
            });
            
            filtered.forEach(d => {
                let itemKey = null;
                if (categoryType === '一级分类') itemKey = d.c1;
                else if (categoryType === '二级分类') itemKey = d.c2;
                else if (categoryType === '三级分类') itemKey = d.c3;
                else if (categoryType === '品牌名称') itemKey = d.b;
                
                if (itemKey && itemMap.has(itemKey)) {
                    const item = itemMap.get(itemKey);
                    item.salesAmount += d.sa;
                    item.salesQty += d.sq;
                    item.orders += d.o;
                }
            });
            
            // 计算总计
            let totalSalesAmount = 0, totalSalesQty = 0, totalOrders = 0;
            itemMap.forEach(item => {
                totalSalesAmount += item.salesAmount;
                totalSalesQty += item.salesQty;
                totalOrders += item.orders;

                });

                // 按照 categoryData 中的原始顺序排序，只保留选中的项
                const allItems = categoryData[categoryType] || [];
                itemsToShow = allItems.filter(item => subcategories.includes(item)).slice(0, 5);
            } else {
                // 如果选择了"全部"，则按照 categoryData 中的顺序取前5个
                itemsToShow = (categoryData[categoryType] || []).slice(0, 5);
            }
            
            // 按细分项收集折扣率数据（dr字段来自order_info表的折扣率）
            const itemMap = new Map();
            itemsToShow.forEach(item => {
                itemMap.set(item, []);
            });
            
            filtered.forEach(d => {
                let itemKey = null;
                if (categoryType === '一级分类') itemKey = d.c1;
                else if (categoryType === '二级分类') itemKey = d.c2;
                else if (categoryType === '三级分类') itemKey = d.c3;
                else if (categoryType === '品牌名称') itemKey = d.b;
                
                // dr 是折扣率字段（来自order_info表）
                // 有效范围是0-1（0表示免费，1表示无折扣，0.8表示8折）
                // 只收集有效的折扣率数据（不为null且在0-1范围内）
                // 确保转换为数字类型
                const dr = d.dr !== null && d.dr !== undefined ? Number(d.dr) : null;
                if (itemKey && itemMap.has(itemKey) && dr !== null && !isNaN(dr) && dr >= 0 && dr <= 1) {
                    itemMap.get(itemKey).push(dr);
                }
            });
            
            // 计算箱线图数据 [索引, 最小值, Q1, 中位数, Q3, 最大值]
            const colors = ['#FEC200', '#23D395', '#4896F4', '#FD9972', '#EE80A2'];
            const result = [];
            let idx = 0;
            itemMap.forEach((values, key) => {
                if (values.length > 0) {
                    // 过滤掉任何不在0-1范围内的值（双重保险）
                    values = values.filter(v => v >= 0 && v <= 1);
                    if (values.length === 0) return;
                    
                    values.sort((a, b) => a - b);
                    // 确保最小值和最大值都在0-1范围内
                    const min = Math.max(0, Math.min(1, values[0]));
                    const max = Math.max(0, Math.min(1, values[values.length - 1]));
                    const q1 = Math.max(0, Math.min(1, values[Math.floor(values.length * 0.25)]));
                    const median = Math.max(0, Math.min(1, values[Math.floor(values.length * 0.5)]));
                    const q3 = Math.max(0, Math.min(1, values[Math.floor(values.length * 0.75)]));
                    
                    // 最终检查
                    if (min > 1 || max > 1) {
                        console.error('数据异常:', key, 'min=', min, 'max=', max, 'values=', values);
                        return;
                    }
                    
                    // ECharts箱线图value格式: [min, Q1, median, Q3, max]
                    result.push({
                        name: key,
                        value: [min, q1, median, q3, max],
                        itemStyle: { color: colors[idx % colors.length], borderColor: colors[idx % colors.length], borderWidth: 2 }
                    });
                    idx++;
                }
            });
            
            return result;
        }
        
        // 更新箱线图
        function updateBoxChart(startDate, endDate, categoryType, subcategories) {

        // 计算雷达图数据
        function calculateRadarData(startDate, endDate, categoryType, subcategories) {
            const data = window.dailyData || [];
            let filtered = data.filter(d => d.d >= startDate && d.d <= endDate);
            
            let itemsToShow = [];
            if (subcategories && !subcategories.includes('all')) {
                const allItems = categoryData[categoryType] || [];
                itemsToShow = allItems.filter(item => subcategories.includes(item)).slice(0, 5);
            } else {
                itemsToShow = (categoryData[categoryType] || []).slice(0, 5);
            }
            
            const itemMap = new Map();
            itemsToShow.forEach(item => {
                itemMap.set(item, { buy_uv: 0, view_uv: 0, sa: 0, da: 0, sq: 0, o: 0, rp_sum: 0, rp_cnt: 0, c1vu: 0 });
            });
            
            filtered.forEach(d => {
                let itemKey = null;
                if (categoryType === '一级分类') itemKey = d.c1;
                else if (categoryType === '二级分类') itemKey = d.c2;
                else if (categoryType === '三级分类') itemKey = d.c3;
                else if (categoryType === '品牌名称') itemKey = d.b;
                
                if (itemKey && itemMap.has(itemKey)) {
                    const s = itemMap.get(itemKey);
                    s.buy_uv += d.bu || 0;
                    s.view_uv += d.vu || 0;
                    s.sa += d.sa || 0;
                    s.da += d.da || 0;
                    s.sq += d.sq || 0;
                    s.o += d.o || 0;
                    s.rp_sum += d.rp || 0;
                    s.rp_cnt += (d.rp > 0 ? 1 : 0);
                    s.c1vu = Math.max(s.c1vu, d.c1vu || 0);
                }
            });
            
            const colors = ['#FEC200', '#23D395', '#4896F4', '#FD9972', '#EE80A2'];
            const result = [];
            let idx = 0;
            
            itemMap.forEach((s, key) => {
                if (s.view_uv > 0 || s.sa > 0) {
                    const conversion = s.view_uv > 0 ? (s.buy_uv / s.view_uv) * 100 : 0;
                    const repurchase = s.rp_cnt > 0 ? (s.rp_sum / s.rp_cnt) * 100 : 0;
                    const discountDep = s.sa > 0 ? (s.da / s.sa) * 100 : 0;
                    const bundle = s.o > 0 ? Math.min((s.sq / s.o) / 10 * 100, 100) : 0;
                    
                    // 计算销量集中度（商品细分类别销量占类目总销量比例）
                    // 首先计算类目总销量
                    let totalSales = 0;
                    itemMap.forEach((itemData) => {
                        totalSales += itemData.sa;
                    });
                    const salesConcentration = totalSales > 0 ? (s.sa / totalSales) * 100 : 0;
                    
                    result.push({
                        name: key,
                        value: [Math.min(conversion, 100), Math.min(repurchase, 100), Math.min(discountDep, 100), bundle, Math.min(salesConcentration, 100)],
                        itemStyle: { color: colors[idx % colors.length] },
                        lineStyle: { color: colors[idx % colors.length], width: 2 },
                        areaStyle: { color: colors[idx % colors.length], opacity: 0.3 }
                    });
                    idx++;
                }
            });
            
            return result;
        }
        
        // 更新雷达图
        function updateRadarChart(startDate, endDate, categoryType, subcategories) {
            if (!radarChart) return;
            
            const data = calculateRadarData(startDate, endDate, categoryType, subcategories);
            
            radarChart.setOption({
                legend: { data: data.map(d => d.name) },
                series: [{ data: data }]
            });
        }
        
        // 计算热力图数据
        function calculateHeatmapData(startDate, endDate, categoryType, subcategories) {
            const data = window.dailyData || [];
            let filtered = data.filter(d => d.d >= startDate && d.d <= endDate);
            
            // 确定要显示的品类（Y轴，最多5个）
            let categoriesToShow = [];
            if (subcategories && !subcategories.includes('all')) {
                const allItems = categoryData[categoryType] || [];
                categoriesToShow = allItems.filter(item => subcategories.includes(item)).slice(0, 5);
            } else {
                categoriesToShow = (categoryData[categoryType] || []).slice(0, 5);
            }
            
            // 确定子品类（X轴）
            let subCategoryField = '';
            let subCategoryLabels = [];
            
            if (categoryType === '一级分类') {
                subCategoryField = 'c2'; // 二级分类
            } else if (categoryType === '二级分类') {
                subCategoryField = 'c3'; // 三级分类
            } else if (categoryType === '三级分类') {
                subCategoryField = 'b'; // 品牌名称
            } else if (categoryType === '品牌名称') {
                subCategoryField = 'sku'; // SKUID - 需要从原始数据获取
            }
            
            // 收集每个品类下的子品类销售量
            const categorySubMap = new Map();
            categoriesToShow.forEach(cat => {
                categorySubMap.set(cat, new Map());
            });
            
            filtered.forEach(d => {
                let catKey = null;
                if (categoryType === '一级分类') catKey = d.c1;
                else if (categoryType === '二级分类') catKey = d.c2;
                else if (categoryType === '三级分类') catKey = d.c3;
                else if (categoryType === '品牌名称') catKey = d.b;
                
                if (catKey && categorySubMap.has(catKey)) {
                    let subKey = null;
                    if (subCategoryField === 'c2') subKey = d.c2;
                    else if (subCategoryField === 'c3') subKey = d.c3;
                    else if (subCategoryField === 'b') subKey = d.b;
                    else if (subCategoryField === 'sku') subKey = d.sku;  // SKUID
                    
                    if (subKey) {
                        const subMap = categorySubMap.get(catKey);
                        subMap.set(subKey, (subMap.get(subKey) || 0) + (d.sq || 0));
                    }
                }
            });
            
            // 获取所有子品类并排序（按总销售量取前10）
            const allSubCategories = new Map();
            categorySubMap.forEach((subMap, cat) => {
                subMap.forEach((sq, sub) => {
                    allSubCategories.set(sub, (allSubCategories.get(sub) || 0) + sq);
                });
            });
            
            const topSubCategories = Array.from(allSubCategories.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([sub]) => sub);
            
            // 计算热力图数据 [x索引, y索引, 占比]
            const heatmapData = [];
            categoriesToShow.forEach((cat, yIdx) => {
                const subMap = categorySubMap.get(cat);
                const totalSq = Array.from(subMap.values()).reduce((a, b) => a + b, 0);
                
                topSubCategories.forEach((sub, xIdx) => {
                    const sq = subMap.get(sub) || 0;
                    const percentage = totalSq > 0 ? (sq / totalSq) * 100 : 0;
                    heatmapData.push({
                        value: [xIdx, yIdx, parseFloat(percentage.toFixed(1))],
                        name: cat + ' - ' + sub
                    });
                });
            });
            
            return {
                yAxis: categoriesToShow,
                xAxis: topSubCategories,
                data: heatmapData.map(d => d.value)
            };
        }
        
        // 更新热力图
        function updateHeatmapChart(startDate, endDate, categoryType, subcategories) {
            if (!heatmapChart) return;
            
            const result = calculateHeatmapData(startDate, endDate, categoryType, subcategories);
            
            heatmapChart.setOption({
                xAxis: { data: result.xAxis },
                yAxis: { data: result.yAxis },
                series: [{ data: result.data }]
            });
        }
        
        // 3D关联规则数据（全局变量）
        let associationRulesData = null;
        let relationChart = null;
        
        // 初始化空的3D图
        function initRelationChart3D() {
            // 不再在这里设置内容，由loadAssociationRulesData处理
        }
        
        // 更新3D关联规则图 - 使用Python预计算的NetworkX spring_layout位置
        async function updateRelationChart3D(categoryType, activityType) {
            const chartDiv = document.getElementById('relationChart');
            
            if (!associationRulesData) {
                chartDiv.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#ff6b6b;font-size:12px;">数据未加载</div>';
                return;
            }
            
            // 获取对应层级和活动类型的数据
            const levelData = associationRulesData[categoryType];
            if (!levelData) {
                chartDiv.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#888;font-size:12px;">无' + categoryType + '数据</div>';
                return;
            }
            
            const data = levelData[activityType];
            if (!data || !data.nodes || data.nodes.length === 0) {
                chartDiv.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#888;font-size:12px;">当前条件下无关联规则数据</div>';
                return;
            }
            
            const nodes = data.nodes;
            const edges = data.edges;
            
            // 显示进度条
            let progress = 0;
            const updateProgress = (percent, message) => {
                progress = percent;
                chartDiv.innerHTML = `
                    <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;color:#fff;">
                        <div style="font-size:14px;margin-bottom:15px;">${message}</div>
                        <div style="width:200px;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;">
                            <div style="width:${progress}%;height:100%;background:linear-gradient(90deg,#FEC200,#FD9972);transition:width 0.3s;"></div>
                        </div>
                        <div style="font-size:12px;margin-top:8px;color:rgba(255,255,255,0.7);">${Math.round(progress)}%</div>
                    </div>
                `;
            };
            
            // 步骤1: 准备节点数据 (使用预计算的NetworkX位置)
            updateProgress(30, '准备节点数据...');
            await new Promise(r => setTimeout(r, 50));
            
            // 构建节点位置映射 (直接使用Python计算的spring_layout位置)
            const nodePositions = {};
            nodes.forEach(node => {
                // 检查节点是否有坐标值，如果没有则使用默认值
                nodePositions[node.id] = {
                    x: node.x !== undefined ? node.x : (Math.random() - 0.5) * 2,
                    y: node.y !== undefined ? node.y : (Math.random() - 0.5) * 2,
                    z: node.z !== undefined ? node.z : (Math.random() - 0.5) * 2
                };
            });
            
            // 步骤2: 生成节点提示框内容 (优化：使用Map避免双重循环)
            updateProgress(50, '生成节点提示...');
            await new Promise(r => setTimeout(r, 10));
            
            // 预构建边索引，避免O(n*m)循环
            const edgesBySource = {};
            edges.forEach(e => {
                if (!edgesBySource[e.source]) edgesBySource[e.source] = [];
                edgesBySource[e.source].push(e);
            });
            
            const nodeHoverText = {};
            nodes.forEach(node => {
                const nodeEdges = edgesBySource[node.id] || [];
                if (nodeEdges.length > 0) {
                    const ruleDetails = nodeEdges.slice(0, 5).map(e => 
                        `  → ${e.target} (支持度: ${e.support.toFixed(4)}, 置信度: ${e.confidence.toFixed(2)})`
                    ).join('<br>');
                    const moreText = nodeEdges.length > 5 ? `<br>  ... 还有${nodeEdges.length - 5}条规则` : '';
                    nodeHoverText[node.id] = `<b>节点: ${node.name}</b><br>相关关联规则 (作为前项):<br>${ruleDetails}${moreText}`;
                } else {
                    nodeHoverText[node.id] = `<b>节点: ${node.name}</b><br>无后续关联规则`;
                }
            });
            
            // 步骤3: 生成连线和节点数据 (优化：批量合并线段)
            updateProgress(70, '生成图形数据...');
            await new Promise(r => setTimeout(r, 10));
            
            // 收缩因子 - 连线不从球心出发
            const shrinkFactor = 0.08;
            
            // 构建Plotly数据
            const traces = [];
            const colors = ['#FEC200', '#F5D047', '#FFEB87', '#23D395', '#FD9972', '#FFA15A', '#4896F4', '#EE80A2', '#B6E880'];
            
            // 计算lift范围
            const lifts = edges.map(e => e.lift);
            const maxLift = Math.max(...lifts);
            const minLift = Math.min(...lifts);
            
            // 优化：将所有连线合并为单个trace，使用null分隔不同线段
            const lineX = [], lineY = [], lineZ = [], lineColors = [], lineWidths = [];
            edges.forEach(edge => {
                const source = nodePositions[edge.source];
                const target = nodePositions[edge.target];
                if (source && target) {
                    const dx = target.x - source.x;
                    const dy = target.y - source.y;
                    const dz = target.z - source.z;
                    
                    // 缩短连线两端
                    const x0 = source.x + shrinkFactor * dx;
                    const y0 = source.y + shrinkFactor * dy;
                    const z0 = source.z + shrinkFactor * dz;
                    const x1 = target.x - shrinkFactor * dx;
                    const y1 = target.y - shrinkFactor * dy;
                    const z1 = target.z - shrinkFactor * dz;
                    
                    // 连线颜色基于lift
                    let colorVal = 100;
                    if (maxLift > minLift) {
                        colorVal = 50 + ((edge.lift - minLift) / (maxLift - minLift) * 150);
                    }
                    
                    lineX.push(x0, x1, null);
                    lineY.push(y0, y1, null);
                    lineZ.push(z0, z1, null);
                    lineColors.push(`rgba(${colorVal},${colorVal},${colorVal},0.6)`);
                    lineWidths.push(Math.max(1, edge.confidence * 5));
                }
            });
            
            // 使用单一trace绘制所有连线
            if (lineX.length > 0) {
                traces.push({
                    type: 'scatter3d',
                    mode: 'lines',
                    x: lineX,
                    y: lineY,
                    z: lineZ,
                    line: {
                        color: 'rgba(150,150,150,0.4)',
                        width: 1
                    },
                    hoverinfo: 'none',
                    showlegend: false
                });
            }
            
            // 按类别分组绘制节点
            const uniqueCats = [...new Set(nodes.map(n => n.category))];
            const catToColor = {};
            uniqueCats.forEach((cat, i) => {
                catToColor[cat] = colors[i % colors.length];
            });
            
            uniqueCats.forEach(cat => {
                const catNodes = nodes.filter(n => n.category === cat);
                const color = catToColor[cat];
                
                traces.push({
                    type: 'scatter3d',
                    mode: 'markers+text',
                    x: catNodes.map(n => nodePositions[n.id].x),
                    y: catNodes.map(n => nodePositions[n.id].y),
                    z: catNodes.map(n => nodePositions[n.id].z),
                    text: catNodes.map(n => n.name),
                    textposition: 'top center',
                    textfont: { color: '#fff', size: 9 },
                    marker: {
                        size: catNodes.map(n => Math.max(5, (n.support || 0.01) * 500)),
                        color: color,
                        line: { color: 'black', width: 0.5 }
                    },
                    name: cat,
                    hoverinfo: 'text',
                    hovertext: catNodes.map(n => nodeHoverText[n.id])
                });
            });
            
            // 步骤4: 渲染图形
            updateProgress(90, '渲染3D图形...');
            
            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 0, r: 0, t: 30, b: 0 },
                scene: {
                    xaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                    yaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                    zaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                    bgcolor: 'rgba(0,0,0,0)',
                    camera: { 
                        eye: { x: 1.5, y: 1.5, z: 1.2 },
                        autorotate: true,
                        autorotateSpeed: 2 
                    },
                    aspectmode: 'data',
                    dragmode: 'orbit'
                },
                showlegend: false,
                title: { 
                    text: `${categoryType} - ${activityType}`, 
                    font: { color: '#fff', size: 12 } 
                },
                hoverlabel: { bgcolor: 'white', font: { color: '#000', size: 12 }, align: 'left' },
                autosize: true
            };
            
            const config = { 
                responsive: true, 
                displayModeBar: false,
                scrollZoom: true
            };
            
            // 调试信息
            console.log('Plotly对象:', typeof Plotly);
            console.log('traces数组长度:', traces.length);
            console.log('traces数组:', traces);
            console.log('容器尺寸:', chartDiv.clientWidth, 'x', chartDiv.clientHeight);
            console.log('布局:', layout);
            console.log('配置:', config);
            // 使用 requestAnimationFrame 避免阻塞UI
            await new Promise(resolve => {
                requestAnimationFrame(() => {
                    // 先更新进度条到100%
                    updateProgress(100, '渲染完成...');
                    // 短暂延迟后再渲染，让用户看到100%的进度
                    setTimeout(() => {
                        try {
                            // 确保容器是空的，清除进度条内容
                            chartDiv.innerHTML = '';
                            // 检查Plotly是否存在
                            if (typeof Plotly === 'undefined') {
                                throw new Error('Plotly库未加载');
                            }
                            // 检查traces是否有数据
                            if (traces.length === 0) {
                                throw new Error('没有数据可渲染');
                            }
                            console.log('开始渲染3D图表，traces数量:', traces.length);
                            console.log('图表容器:', chartDiv);
                            
                            // 确保容器有足够的尺寸
                            chartDiv.style.width = '100%';
                            console.log('容器尺寸:', chartDiv.clientWidth, 'x', chartDiv.clientHeight);
                            
                            // 尝试创建新图表
                            try {
                                console.log('开始调用Plotly.newPlot');
                                const plot = Plotly.newPlot(chartDiv, traces, layout, config);
                                console.log('Plotly.newPlot调用成功，返回:', plot);
                                
                                plot.then((gd) => {
                                    console.log('3D图表渲染成功，返回的图表对象:', gd);
                                    relationChart = gd;

                                    // 手动实现自动旋转（支持悬停暂停）
                                    let angle = 0;
                                    let isRotating = true;
                                    let rafId = null;
                                    const radius = Math.sqrt(1.5*1.5 + 1.5*1.5);
                                    
                                    function autoRotate() {
                                        if (!relationChart || !isRotating) { rafId = null; return; }
                                        angle += 0.008;
                                        const eyeX = radius * Math.cos(angle);
                                        const eyeY = radius * Math.sin(angle);
                                        Plotly.relayout(gd, {
                                            'scene.camera.eye.x': eyeX,
                                            'scene.camera.eye.y': eyeY,
                                            'scene.camera.eye.z': 1.2
                                        });
                                        rafId = requestAnimationFrame(autoRotate);
                                    }
                                    
                                    // 鼠标进入时停止旋转
                                    chartDiv.addEventListener('mouseenter', () => {
                                        isRotating = false;
                                        if (rafId) cancelAnimationFrame(rafId);
                                    });
                                    // 鼠标移开后恢复旋转
                                    chartDiv.addEventListener('mouseleave', () => {
                                        isRotating = true;
                                        autoRotate();
                                    });
                                    
                                    autoRotate();

                                    resolve();
                                }).catch(error => {
                                    console.error('3D图表渲染失败:', error);

        // 加载关联规则JSON数据（使用预计算3D布局）
        async function loadAssociationRulesData() {
            const chartDiv = document.getElementById('relationChart');
            try {
                chartDiv.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#fff;font-size:14px;">正在加载数据...</div>';
                
                // 尝试多个路径加载JSON文件
                const paths = [
                    'association_rules_3d.json',
                    './association_rules_3d.json',
                    window.location.pathname.replace(/\/[^\/]*$/, '') + '/association_rules_3d.json'
                ];
                
                let lastError = null;
                for (const path of paths) {
                    try {
                        console.log('尝试加载:', path);
                        const response = await fetch(path);
                        if (response.ok) {
                            associationRulesData = await response.json();
                            console.log('关联规则数据加载完成:', Object.keys(associationRulesData));
                            return true;
                        }
                    } catch (e) {
                        lastError = e;
                        console.warn('路径加载失败:', path, e.message);
                    }
                }
                
                throw lastError || new Error('所有路径都无法加载数据');
            } catch (error) {
                console.error('加载关联规则数据失败:', error);
                chartDiv.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#ff6b6b;font-size:12px;flex-direction:column;"><div>数据加载失败</div><div style="margin-top:8px;color:#888;">' + error.message + '</div><div style="margin-top:8px;color:#666;font-size:11px;">请确保通过HTTP服务器访问此页面</div></div>';
                return false;
            }
        }

        function openChartModal(chartInstance, title) {
            const modal = document.getElementById('chartModal');
            const modalTitle = document.getElementById('modalTitle');
            modalTitle.textContent = title;
            modal.style.display = 'flex';

            modalChart = echarts.init(document.getElementById('modalChart'));

            if (option.title && option.title[0]) {

                option.title[0].textStyle.fontSize = 18;
            }
            modalChart.setOption(option);
        }
        
        function closeChartModal() {
            const modal = document.getElementById('chartModal');
            modal.style.display = 'none';
            
            // 清理ECharts图表
            if (modalChart) {
                modalChart.dispose();
                modalChart = null;

            const modalChartDiv = document.getElementById('modalChart');
            if (modalChartDiv) {
                Plotly.purge(modalChartDiv);
                modalChartDiv.innerHTML = '';

        function bindChartDblClick(chartInstance, title) {
            chartInstance.getZr().on('dblclick', function() {

            });
        }
        
        // Plotly图表的双击放大
        function openPlotlyModal(chartId, title) {
            const modal = document.getElementById('chartModal');
            const modalTitle = document.getElementById('modalTitle');
            modalTitle.textContent = title;
            modal.style.display = 'flex';
            
            // 清除之前的图表
            const modalChartDiv = document.getElementById('modalChart');
            modalChartDiv.innerHTML = '';
            
            // 复制当前3D图到模态框中
            const originalChart = document.getElementById(chartId);
            if (originalChart && originalChart.data) {
                // 获取原始Plotly图表的数据和布局
                Plotly.purge(modalChartDiv);
                
                // 创建新的div用于模态框中的图表
                const newDiv = document.createElement('div');
                newDiv.style.width = '100%';
                newDiv.style.height = '100%';
                modalChartDiv.appendChild(newDiv);
                
                // 重新绘制图表，使用更大的尺寸
                Plotly.newPlot(newDiv, originalChart.data, {
                    ...originalChart.layout,
                    width: undefined,
                    height: undefined,
                    autosize: true,
                    title: { ...originalChart.layout.title, font: { size: 18 } }
                }, { responsive: true, displayModeBar: true });
            } else {
                modalChartDiv.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#fff;">暂无数据</div>';
            }
        }
        
        // 点击模态框背景关闭
        document.getElementById('chartModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeChartModal();
            }
        });
        
        // ESC键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeChartModal();
            }
        });
    </script>
</body>
</html>
